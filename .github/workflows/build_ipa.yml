name: Build iOS IPA
on: [push]

jobs:
  build:
    name: Flutter iOS build
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.0'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build IPA (no-codesign)
        run: flutter build ipa --no-codesign

      - name: Find Runner.app and sign ad-hoc
        run: |
          echo "=== Searching for Runner.app ==="
          APP_PATH=$(find build/ios -name "Runner.app" -type d | head -1)
          echo "Found: $APP_PATH"

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Runner.app not found anywhere in build/ios"
            ls -la build/ios/ || echo "build/ios does not exist"
            exit 1
          fi

          # Sign frameworks first
          find "$APP_PATH/Frameworks" -name "*.framework" -type d 2>/dev/null | while read fw; do
            echo "Signing: $fw"
            codesign -f -s - --timestamp=none "$fw"
          done

          # Sign main app
          echo "Signing app: $APP_PATH"
          codesign -f -s - --timestamp=none "$APP_PATH"
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV

      - name: Package signed IPA
        run: |
          echo "Packaging: $APP_PATH"
          rm -rf /tmp/Payload
          mkdir -p /tmp/Payload
          cp -r "$APP_PATH" /tmp/Payload/Runner.app
          cd /tmp && zip -r bot_signed.ipa Payload
          cp /tmp/bot_signed.ipa "$GITHUB_WORKSPACE/bot_signed.ipa"
          ls -lh "$GITHUB_WORKSPACE/bot_signed.ipa"

      - name: Upload signed IPA
        uses: actions/upload-artifact@v4
        with:
          name: bot-ipa-signed
          path: bot_signed.ipa
          retention-days: 30
          if-no-files-found: error
